<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS AI Assistant</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/6c4f7fbd2f.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="background"></div>

<header>

<div class="logo">
<h1>JARVIS</h1>
<p>Artificial Intelligence Assistant</p>
</div>

<div class="status">
<span id="statusText">● ONLINE</span>
</div>

</header>


<main>

<section class="left-panel">

<div class="ai-circle">

<div class="circle1"></div>
<div class="circle2"></div>
<div class="circle3"></div>

<div class="core">
<h2>AI</h2>
</div>

</div>

<div class="clock">

<h1 id="time">
00:00:00
</h1>

<p id="date">
Loading...
</p>

</div>

</section>



<section class="right-panel">

<div class="chat-box" id="chatBox">

<div class="message bot">

<div class="avatar">
🤖
</div>

<div class="text">
Hello Ankush!<br>
I am JARVIS.<br>
How can I help you today?
</div>

</div>

</div>


<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Type your command...">

<button id="sendBtn">

<i class="fas fa-paper-plane"></i>

</button>

<button id="micBtn">

<i class="fas fa-microphone"></i>

</button>

</div>

</section>

</main>


<footer>

<div class="cards">

<div class="card">
🌐
<p>Google Search</p>
</div>

<div class="card">
▶️
<p>YouTube</p>
</div>

<div class="card">
🌤️
<p>Weather</p>
</div>

<div class="card">
📂
<p>Files</p>
</div>

<div class="card">
⚙️
<p>Settings</p>
</div>

<div class="card">
🧠
<p>AI Memory</p>
</div>

</div>

</footer>

<div id="notification">

Ready...

</div>

<script src="script.js"></script>

</body>
</html>
